name: API Dump

on:
  # Allows you to run this workflow manually from the Actions tab on any branch
  workflow_dispatch:

jobs:
  api-dump:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run apiDump
        run: ./gradlew apiDump

      - name: Commit and push API dump changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all '**/api/*.klib.api' '**/api/**/*.api'
          git diff --cached --quiet || git commit -m "Run `apiDump`"
          git push
