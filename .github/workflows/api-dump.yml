name: API Dump

on:
  # Allows you to run this workflow manually from the Actions tab on any branch
  workflow_dispatch:

jobs:
  api-dump:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run apiDump
        run: ./gradlew apiDump

      - name: Upload API dump artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-dump
          path: |
            **/api/*.klib.api
            **/api/**/*.api
